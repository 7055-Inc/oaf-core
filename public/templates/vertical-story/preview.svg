<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fafafa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#grad1)"/>
  
  <!-- Timeline -->
  <rect x="598" y="0" width="4" height="800" fill="#e0e0e0"/>
  <rect x="598" y="0" width="4" height="400" fill="#1a1a1a"/>
  
  <!-- Chapter 1 (left) -->
  <rect x="100" y="100" width="400" height="200" fill="#ffffff" rx="8" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <text x="130" y="145" font-family="Georgia, serif" font-size="24" font-weight="400" fill="#2a2a2a">Chapter One</text>
  <text x="130" y="180" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">The beginning of the story...</text>
  <text x="130" y="200" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">with elegant typography and</text>
  <text x="130" y="220" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">thoughtful layout design.</text>
  
  <!-- Chapter 2 (right) -->
  <rect x="700" y="350" width="400" height="200" fill="#ffffff" rx="8" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <text x="730" y="395" font-family="Georgia, serif" font-size="24" font-weight="400" fill="#2a2a2a">Chapter Two</text>
  <text x="730" y="430" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">Alternating sides create</text>
  <text x="730" y="450" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">visual rhythm and guide</text>
  <text x="730" y="470" font-family="Georgia, serif" font-size="14" fill="rgba(0,0,0,0.6)">the reader's journey.</text>
  
  <!-- Timeline dots -->
  <circle cx="600" cy="150" r="8" fill="#1a1a1a"/>
  <circle cx="600" cy="400" r="8" fill="#1a1a1a"/>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="4" fill="#2a2a2a"/>
  <text x="1080" y="41" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">PRO " NARRATIVE</text>
</svg>
