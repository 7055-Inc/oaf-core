<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Cork board background -->
  <defs>
    <pattern id="cork" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#d4af7a"/>
      <circle cx="5" cy="5" r="1" fill="rgba(0,0,0,0.05)"/>
      <circle cx="25" cy="25" r="1" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="800" fill="url(#cork)"/>
  
  <!-- Polaroid 1 (rotated left) -->
  <g transform="rotate(-3 200 300)">
    <rect x="100" y="200" width="200" height="240" fill="#ffffff" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
    <rect x="110" y="210" width="180" height="180" fill="#d0d0d0"/>
    <!-- Tape -->
    <rect x="250" y="190" width="40" height="20" fill="rgba(255,255,200,0.8)" transform="rotate(45 270 200)"/>
  </g>
  
  <!-- Polaroid 2 (rotated right) -->
  <g transform="rotate(4 500 300)">
    <rect x="400" y="200" width="200" height="240" fill="#ffffff" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
    <rect x="410" y="210" width="180" height="180" fill="#c8c8c8"/>
    <rect x="550" y="190" width="40" height="20" fill="rgba(255,255,200,0.8)" transform="rotate(45 570 200)"/>
  </g>
  
  <!-- Polaroid 3 (rotated left) -->
  <g transform="rotate(-2 800 300)">
    <rect x="700" y="200" width="200" height="240" fill="#ffffff" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
    <rect x="710" y="210" width="180" height="180" fill="#d5d5d5"/>
    <rect x="850" y="190" width="40" height="20" fill="rgba(255,255,200,0.8)" transform="rotate(45 870 200)"/>
  </g>
  
  <!-- Polaroid 4 (rotated right) -->
  <g transform="rotate(3 1100 300)">
    <rect x="1000" y="200" width="200" height="240" fill="#ffffff" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.2))"/>
    <rect x="1010" y="210" width="180" height="180" fill="#c0c0c0"/>
    <rect x="1150" y="190" width="40" height="20" fill="rgba(255,255,200,0.8)" transform="rotate(45 1170 200)"/>
  </g>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="4" fill="#8b4513"/>
  <text x="1080" y="41" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">BASIC " NOSTALGIC</text>
</svg>
