<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#e0e0e0"/>
  
  <!-- Side Menu (Left) -->
  <rect width="260" height="800" fill="#ffffff" opacity="0.95"/>
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">avante</text>
  <line x1="30" y1="80" x2="230" y2="80" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Menu items -->
  <text x="30" y="120" font-family="Arial, sans-serif" font-size="10" fill="#666">SHOP ALL</text>
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="10" fill="#666">BAGS</text>
  <text x="30" y="170" font-family="Arial, sans-serif" font-size="10" fill="#666">BOTTOMS</text>
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="10" fill="#666">DRESSES</text>
  <text x="30" y="220" font-family="Arial, sans-serif" font-size="10" fill="#ff0000">SALE</text>
  
  <!-- Social icons -->
  <circle cx="40" cy="750" r="8" fill="#666"/>
  <circle cx="65" cy="750" r="8" fill="#666"/>
  <circle cx="90" cy="750" r="8" fill="#666"/>
  
  <!-- Hero Slideshow Area -->
  <rect x="260" y="0" width="860" height="800" fill="#c8c8c8"/>
  <!-- Hero overlay -->
  <rect x="260" y="0" width="860" height="800" fill="#000000" opacity="0.3"/>
  
  <!-- Hero text -->
  <text x="690" y="350" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">THE NEXT SHOW</text>
  <text x="690" y="390" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">STARTS IN 45 DAYS</text>
  
  <!-- Hero button -->
  <rect x="590" y="420" width="200" height="45" rx="22" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="690" y="448" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">FIND OUT MORE</text>
  
  <!-- Slideshow controls -->
  <text x="690" y="750" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">1 / 3</text>
  <circle cx="650" cy="745" r="18" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="650" y="751" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">9</text>
  <circle cx="730" cy="745" r="18" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="730" y="751" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">:</text>
  
  <!-- Side Footer (Right) -->
  <rect x="1120" y="0" width="80" height="800" fill="#1a1a1a"/>
  
  <!-- Vertical text simulation -->
  <text x="1160" y="400" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" transform="rotate(90 1160 400)">ABOUT</text>
  <circle cx="1160" cy="550" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="1160" cy="580" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="1160" cy="610" r="6" fill="#ffffff" opacity="0.7"/>
  
  <!-- Side Clipped Note -->
  <rect x="0" y="370" width="100" height="30" fill="#f4e04d" transform="rotate(-90 50 385)"/>
  <text x="50" y="390" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a" text-anchor="middle" transform="rotate(-90 50 390)">THE NEXT SHOW</text>
  
  <!-- Template label -->
  <rect x="980" y="20" width="200" height="30" rx="6" fill="#000000" opacity="0.7"/>
  <text x="1080" y="41" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">PROFESSIONAL " JS</text>
</svg>
