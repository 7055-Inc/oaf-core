  <text x="600" y="40" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">HOME    LOOKS    NEW ARRIVALS    SHOP    SALE</text>
  
  <!-- Circular Categories -->
  <rect y="61" width="1200" height="140" fill="#f9f9f9"/>
  <!-- Circles -->
  <circle cx="150" cy="110" r="40" fill="#d0d0d0" stroke="#e0c896" stroke-width="3"/>
  <circle cx="260" cy="110" r="40" fill="#c8c8c8" stroke="#e0c896" stroke-width="3"/>
  <circle cx="370" cy="110" r="40" fill="#d5d5d5" stroke="#e0c896" stroke-width="3"/>
  <circle cx="480" cy="110" r="40" fill="#c0c0c0" stroke="#e0c896" stroke-width="3"/>
