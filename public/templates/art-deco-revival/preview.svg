<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#f5f5f0"/>
  
  <!-- Header with geometric pattern -->
  <rect width="1200" height="150" fill="#1a1a1a"/>
  <pattern id="deco" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="40" y2="40" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
    <line x1="40" y1="0" x2="0" y2="40" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="150" fill="url(#deco)"/>
  
  <text x="600" y="85" font-family="serif" font-size="48" font-weight="400" fill="#d4af37" text-anchor="middle" letter-spacing="12">ART DECO</text>
  <text x="580" y="85" font-family="serif" font-size="24" fill="#d4af37" text-anchor="end">Æ</text>
  <text x="620" y="85" font-family="serif" font-size="24" fill="#d4af37" text-anchor="start">Æ</text>
  
  <!-- Products with clipped corners -->
  <polygon points="120,220 320,220 330,230 330,490 320,500 120,500 110,490 110,230" fill="#ffffff"/>
  <polygon points="130,230 310,230 320,240 320,480 310,490 130,490 120,480 120,240" fill="none" stroke="#d4af37" stroke-width="2"/>
  
  <polygon points="450,220 650,220 660,230 660,490 650,500 450,500 440,490 440,230" fill="#ffffff"/>
  <polygon points="460,230 640,230 650,240 650,480 640,490 460,490 450,480 450,240" fill="none" stroke="#d4af37" stroke-width="2"/>
  
  <polygon points="780,220 980,220 990,230 990,490 980,500 780,500 770,490 770,230" fill="#ffffff"/>
  <polygon points="790,230 970,230 980,240 980,480 970,490 790,490 780,480 780,240" fill="none" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="0" fill="#1a1a1a"/>
  <text x="1080" y="41" font-family="serif" font-size="11" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="2">PRO " 1920s LUXURY</text>
</svg>
