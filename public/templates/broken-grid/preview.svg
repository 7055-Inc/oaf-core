<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- Header (tilted) -->
  <g transform="rotate(-0.5 600 60)">
    <rect x="100" y="20" width="1000" height="80" fill="#ffffff"/>
    <rect x="100" y="20" width="1000" height="80" fill="#000000" opacity="0.05" transform="translate(3 3)"/>
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#1a1a1a">BROKEN GRID</text>
  </g>
  
  <!-- Product cards with random rotations -->
  <g transform="rotate(2 200 300)">
    <rect x="100" y="200" width="250" height="320" fill="#ffffff"/>
    <rect x="106" y="206" width="238" height="240" fill="#d0d0d0"/>
    <!-- Tape -->
    <rect x="195" y="190" width="60" height="20" fill="#fffacd" opacity="0.8" transform="rotate(45 225 200)"/>
  </g>
  
  <g transform="rotate(-3 575 300)">
    <rect x="375" y="200" width="250" height="320" fill="#ffffff"/>
    <rect x="381" y="206" width="238" height="240" fill="#c8c8c8"/>
    <rect x="470" y="190" width="60" height="20" fill="#fffacd" opacity="0.8" transform="rotate(45 500 200)"/>
  </g>
  
  <g transform="rotate(1 850 300)">
    <rect x="650" y="200" width="250" height="320" fill="#ffffff"/>
    <rect x="656" y="206" width="238" height="240" fill="#d5d5d5"/>
    <rect x="745" y="190" width="60" height="20" fill="#fffacd" opacity="0.8" transform="rotate(45 775 200)"/>
  </g>
  
  <g transform="rotate(-2 1125 300) translate(10 -5)">
    <rect x="925" y="200" width="250" height="320" fill="#ffffff"/>
    <rect x="931" y="206" width="238" height="240" fill="#c0c0c0"/>
    <rect x="1020" y="190" width="60" height="20" fill="#fffacd" opacity="0.8" transform="rotate(45 1050 200)"/>
  </g>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="0" fill="#ff0000"/>
  <text x="1080" y="41" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">PRO " EXPERIMENTAL</text>
</svg>
