<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="1200" height="800" fill="#0a0a0a"/>
  
  <!-- Header -->
  <rect width="1200" height="70" fill="#1a1a1a" opacity="0.8"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">LUXURY BRAND</text>
  
  <!-- Hero Section with overlay -->
  <rect y="70" width="1200" height="400" fill="#2a2a2a"/>
  <rect y="70" width="1200" height="400" fill="#000000" opacity="0.5"/>
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="3">PREMIUM COLLECTION</text>
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">Bold by design</text>
  <rect x="500" y="300" width="200" height="50" rx="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="600" y="332" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">DISCOVER MORE</text>
  
  <!-- Products Section (light background) -->
  <rect y="470" width="1200" height="330" fill="#f5f5f5"/>
  <text x="40" y="520" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#1a1a1a">Just arrived</text>
  
  <!-- Product Cards -->
  <rect x="40" y="550" width="260" height="220" rx="12" fill="#ffffff"/>
  <rect x="40" y="550" width="260" height="165" fill="#d0d0d0"/>
  <rect x="320" y="550" width="260" height="220" rx="12" fill="#ffffff"/>
  <rect x="320" y="550" width="260" height="165" fill="#c0c0c0"/>
  <rect x="600" y="550" width="260" height="220" rx="12" fill="#ffffff"/>
  <rect x="600" y="550" width="260" height="165" fill="#d5d5d5"/>
  <rect x="880" y="550" width="260" height="220" rx="12" fill="#ffffff"/>
  <rect x="880" y="550" width="260" height="165" fill="#c5c5c5"/>
  
  <!-- Template name label -->
  <rect x="980" y="20" width="200" height="40" rx="8" fill="#ffffff" opacity="0.15"/>
  <text x="1080" y="45" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">PROFESSIONAL TIER</text>
</svg>
