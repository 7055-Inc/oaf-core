<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Header border -->
  <rect width="1200" height="4" fill="#000000"/>
  <rect y="100" width="1200" height="4" fill="#000000"/>
  
  <!-- Header -->
  <text x="40" y="65" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#000000">BRUTALIST</text>
  
  <!-- Giant hero text -->
  <text x="40" y="250" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#000000">RAW</text>
  <text x="40" y="350" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#000000">DESIGN</text>
  
  <!-- Product grid with borders -->
  <rect y="400" width="1200" height="4" fill="#000000"/>
  
  <!-- Grid cells -->
  <rect x="0" y="404" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <rect x="300" y="404" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <rect x="600" y="404" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <rect x="900" y="404" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  
  <!-- Images in cells -->
  <rect x="20" y="424" width="260" height="120" fill="#d0d0d0"/>
  <rect x="320" y="424" width="260" height="120" fill="#c0c0c0"/>
  <rect x="620" y="424" width="260" height="120" fill="#d5d5d5"/>
  <rect x="920" y="424" width="260" height="120" fill="#c8c8c8"/>
  
  <!-- Footer border -->
  <rect y="604" width="1200" height="4" fill="#000000"/>
  <rect y="608" width="1200" height="192" fill="#000000"/>
  
  <!-- Footer text -->
  <text x="40" y="650" font-family="Courier New, monospace" font-size="14" font-weight="700" fill="#0000ff">COPYRIGHT © 2026</text>
  <text x="40" y="680" font-family="Courier New, monospace" font-size="14" font-weight="700" fill="#0000ff">&gt; TERMINAL_FOOTER.EXECUTE()</text>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="0" fill="#000000"/>
  <text x="1080" y="41" font-family="Courier New" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">BASIC " BRUTALIST</text>
</svg>
