<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="darkBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9e79f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="1200" height="800" fill="url(#darkBg)"/>
  
  <!-- Header -->
  <text x="600" y="100" font-family="Georgia, serif" font-size="42" font-weight="300" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="8">GALLERY NOIR</text>
  <line x1="400" y1="130" x2="800" y2="130" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  
  <!-- Product cards with frames -->
  <g opacity="0.9">
    <!-- Card 1 -->
    <rect x="100" y="200" width="280" height="360" fill="rgba(20,20,20,0.8)" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
    <rect x="120" y="220" width="240" height="300" fill="#0a0a0a" stroke="#d4af37" stroke-width="2"/>
    <rect x="128" y="228" width="224" height="284" fill="#333333"/>
    
    <!-- Card 2 -->
    <rect x="460" y="200" width="280" height="360" fill="rgba(20,20,20,0.8)" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
    <rect x="480" y="220" width="240" height="300" fill="#0a0a0a" stroke="#d4af37" stroke-width="2"/>
    <rect x="488" y="228" width="224" height="284" fill="#2a2a2a"/>
    
    <!-- Card 3 -->
    <rect x="820" y="200" width="280" height="360" fill="rgba(20,20,20,0.8)" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
    <rect x="840" y="220" width="240" height="300" fill="#0a0a0a" stroke="#d4af37" stroke-width="2"/>
    <rect x="848" y="228" width="224" height="284" fill="#3a3a3a"/>
  </g>
  
  <!-- Spotlight effect -->
  <ellipse cx="600" cy="100" rx="400" ry="600" fill="rgba(255,255,255,0.02)" opacity="0.5"/>
  
  <!-- Label -->
  <rect x="980" y="20" width="200" height="30" rx="4" fill="url(#goldGrad)"/>
  <text x="1080" y="41" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#0a0a0a" text-anchor="middle">PRO " MUSEUM LUXURY</text>
</svg>
