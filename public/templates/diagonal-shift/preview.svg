<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- Entire layout rotated -->
  <g transform="rotate(15 600 400)">
    <!-- Header -->
    <rect x="200" y="100" width="800" height="80" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="250" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1a1a1a" transform="rotate(-15 250 150)">DIAGONAL</text>
    
    <!-- Products -->
    <rect x="200" y="220" width="240" height="300" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="210" y="230" width="220" height="200" fill="#d0d0d0"/>
    
    <rect x="480" y="220" width="240" height="300" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="490" y="230" width="220" height="200" fill="#c8c8c8"/>
    
    <rect x="760" y="220" width="240" height="300" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="770" y="230" width="220" height="200" fill="#d5d5d5"/>
  </g>
  
  <!-- Label (not rotated) -->
  <rect x="980" y="20" width="200" height="30" rx="4" fill="#1a1a1a"/>
  <text x="1080" y="41" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">PRO " 15° ANGLE</text>
</svg>
