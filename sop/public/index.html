<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Catalog</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="sop-header" id="sop-header">
    <div class="sop-header-inner">
      <a href="/" class="sop-logo">SOP Catalog</a>
      <nav class="sop-nav" id="sop-nav"></nav>
    </div>
  </header>

  <main class="sop-main" id="sop-main">
    <!-- Login or dashboard content injected by app.js -->
    <div id="main-content"></div>
  </main>

  <footer class="sop-footer" id="sop-footer">
    <div class="sop-footer-inner">
      <span id="footer-content">SOP Catalog</span>
    </div>
  </footer>

  <script src="/static/js/block-editor.bundle.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
